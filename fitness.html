<script>
    const cameraInput = document.getElementById('cameraInput');
    const galleryInput = document.getElementById('galleryInput');
    const previewContainer = document.getElementById('previewContainer');
    const preview = document.getElementById('preview');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const loadingText = document.getElementById('loadingText');
    const resultDiv = document.getElementById('result');
    
    const valCalories = document.getElementById('valCalories');
    const valProtein = document.getElementById('valProtein');
    const valCarbs = document.getElementById('valCarbs');
    const valFat = document.getElementById('valFat');
    const detailBox = document.getElementById('detailBox');

    // 🟢 請確保這是您 Vercel 的完整網址
    const API_URL = "https://你的專案名稱.vercel.app/api/analyze"; 
    let base64Image = "";

    // ⚡ 最強防卡死圖片壓縮處理器（改用 Promise 確保一定會執行）
    function compressImage(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const MAX_WIDTH = 800;
                    const MAX_HEIGHT = 800;
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width;
                            width = MAX_WIDTH;
                        }
                    } else {
                        if (height > MAX_HEIGHT) {
                            width *= MAX_HEIGHT / height;
                            height = MAX_HEIGHT;
                        }
                    }

                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    // 輸出輕量級 JPEG
                    resolve(canvas.toDataURL('image/jpeg', 0.7));
                };
                img.onerror = function() { reject(new Error("圖片載入失敗")); };
                img.src = e.target.result;
            };
            reader.onerror = function() { reject(new Error("檔案讀取失敗")); };
            reader.readAsDataURL(file);
        });
    }

    // 監聽選取圖片事件（改用統一的主動式處理）
    async function onFileSelected(file) {
        if (!file) return;
        
        // 先顯示一個暫時的 Loading 感覺
        analyzeBtn.disabled = true;
        analyzeBtn.innerText = "⏳ 正在處理照片...";

        try {
            // 強制等待壓縮完成，絕對不卡死
            const compressedDataUrl = await compressImage(file);
            
            // 顯示預覽
            preview.src = compressedDataUrl;
            previewContainer.style.display = 'block';
            
            // 儲存 Base64 字串
            base64Image = compressedDataUrl.split(',')[1];
            
            // 成功解鎖按鈕
            analyzeBtn.disabled = false;
            analyzeBtn.innerText = "計算營養成分";
        } catch (error) {
            alert("照片讀取崩潰：" + error.message);
            analyzeBtn.innerText = "計算營養成分";
        }
    }

    cameraInput.addEventListener('change', function(e) { onFileSelected(e.target.files[0]); galleryInput.value = ""; });
    galleryInput.addEventListener('change', function(e) { onFileSelected(e.target.files[0]); cameraInput.value = ""; });

    // 點擊辨識按鈕事件
    analyzeBtn.addEventListener('click', async () => {
        if (!base64Image) return;

        loadingText.style.display = 'block';
        resultDiv.style.display = 'none';
        analyzeBtn.disabled = true;

        const promptText = `你是一位高效的營養師。請觀察圖片食物，直接輸出一個純 JSON 物件（不要寫 \`\`\`json 標籤）。
        規範格式：
        {
          "calories": 總熱量純數字(kcal),
          "protein": 蛋白質純數字(g),
          "carbs": 碳水純數字(g),
          "fat": 脂肪純數字(g),
          "analysis": "簡短條列說明看到的食材與克數估計。"
        }`;

        try {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ base64Image, promptText })
            });

            const data = await response.json();
            if (!response.ok) throw new Error(data.error ? data.error : `狀態碼: ${response.status}`);

            let aiText = data.candidates[0].content.parts[0].text.trim();
            if (aiText.startsWith("```")) {
                aiText = aiText.replace(/```json|```/g, "").trim();
            }

            const nutrition = JSON.parse(aiText);

            valCalories.innerText = `${nutrition.calories} kcal`;
            valProtein.innerText = `${nutrition.protein} g`;
            valCarbs.innerText = `${nutrition.carbs} g`;
            valFat.innerText = `${nutrition.fat} g`;
            
            let details = nutrition.analysis.replace(/\n/g, "<br>").replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
            detailBox.innerHTML = `<strong>💡 食材拆解：</strong><br>${details}`;
            
            resultDiv.style.display = 'block';
        } catch (error) {
            console.error("API 錯誤:", error);
            alert(`計算失敗：${error.message}`);
        } finally {
            loadingText.style.display = 'none';
            analyzeBtn.disabled = false;
        }
    });
</script>
